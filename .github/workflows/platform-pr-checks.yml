name: Platform PR Checks

on:
  pull_request:
    branches: [main]
    paths:
      - "platform/**"
      - ".github/workflows/platform-*.yml"

concurrency:
  group: platform-pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: platform

jobs:
  quality:
    name: Typecheck, lint, and test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo local cache
        uses: actions/cache@v4
        with:
          path: platform/.turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('platform/pnpm-lock.yaml', 'platform/turbo.json', 'platform/**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run Turbo quality checks
        run: pnpm turbo run lint typecheck test --summarize

      - name: Typecheck infra
        run: pnpm typecheck:infra

      - name: Upload Turbo run summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: turbo-summaries-pr
          path: platform/.turbo/runs/
          if-no-files-found: ignore
